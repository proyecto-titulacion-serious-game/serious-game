name: Tesis VR CI/CD 🚀

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-docs:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Unity (Windows)
        run: |
          # Usamos la 6000.4.3f1 que tienes en tu Cachy
          /home/mauros/Unity/Hub/Editor/6000.4.3f1/Editor/Unity \
            -batchmode \
            -nographics \
            -silent-crashes \
            -quit \
            -projectPath . \
            -buildWindows64Player "build/SeriousGame.exe" \
            -logFile /dev/stdout

      - name: Generar Doxygen
        run: |
          mkdir -p docs
          doxygen Doxyfile

      - name: Upload Artifact (Juego)
        uses: actions/upload-artifact@v4
        with:
          name: SeriousGame-Build-Windows
          path: build/

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/html/'

      - name: Desplegar Documentación
        id: deployment
        uses: actions/deploy-pages@v4
      # ... después de Doxygen y generar el .txt con lynx ...

      - name: Generar README dinámico
        run: python generate_readme.py

      - name: Actualizar Repositorio
        run: |
          git config --global user.name "Mauro Runner Bot"
          git config --global user.email "mauro-bot@users.noreply.github.com"
          git add README.md
          # El [skip ci] evita que GitHub entre en un bucle infinito
          git commit -m "docs: auto-update architecture and progress [skip ci]" || echo "No changes"
          git push
