name: Tesis VR CI 🚀

on:
  push:
    branches:
      - main

jobs:
  buildForWindows:
    name: Build para Windows 🎮
    runs-on: self-hosted  # <--- Aquí es donde sucede la magia
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache de Librerías ⚡
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-SeriousGame-Windows
          restore-keys: |
            Library-SeriousGame-

      - name: Ejecutar Build en Unity 🛠️
        run: |
          & "C:\Program Files\Unity\Hub\Editor\6000.4.3f1\Editor\Unity.exe" `
          -quit `
          -batchmode `
          -projectPath . `
          -buildTarget StandaloneWindows64 `
          -buildWindows64Player "build/StandaloneWindows64/SeriousGame.exe" `
          -logFile "unity_build.log"

      - name: Subir Artefacto 📦
        uses: actions/upload-artifact@v3
        with:
          name: Build-Windows-Tesis
          path: build/StandaloneWindows64/
