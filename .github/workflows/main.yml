name: Tesis VR CI/CD 🚀

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-docs:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Unity (Windows)
        run: |
          /home/mauros/Unity/Hub/Editor/6000.3.12f1/Editor/Unity \
            -batchmode \
            -nographics \
            -silent-crashes \
            -quit \
            -projectPath . \
            -buildWindows64Player "build/SeriousGame.exe" \
            -logFile /dev/stdout

      - name: Generar Doxygen
        run: |
          mkdir -p docs
          doxygen Doxyfile

      # --- AQUÍ EMPIEZA LO DE GITHUB PAGES ---
      
      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/html/' # La carpeta que genera tu PC

      - name: Desplegar Documentación
        id: deployment
        uses: actions/deploy-pages@v4
